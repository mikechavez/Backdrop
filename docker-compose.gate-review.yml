version: '3.8'

services:
  mongodb-gate-review:
    image: mongo:7.0
    container_name: bugops-gate-review-mongo
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_DATABASE: bugops_gate_review
    volumes:
      - bugops_gate_review_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  bugops_gate_review_data:
